name: Build, Test & Publish NuGet

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # triggers publish on v1.0.0, v1.2.3-beta.1, etc.
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Build, test, smoke, and pack the package ──────────────────────────
  build:
    name: Build & Pack
    runs-on: ubuntu-latest

    outputs:
      package_version: ${{ steps.package-version.outputs.package_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # full history required for Source Link

      - name: Set up .NET SDKs (8 / 9 / 10)
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Determine package version
        id: package-version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
          else
            PACKAGE_VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' src/SecureFileUpload.Core.csproj)"
          fi

          if [[ -z "$PACKAGE_VERSION" ]]; then
            echo "::error::Could not determine package version."
            exit 1
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using package version: $PACKAGE_VERSION"

      - name: Restore solution
        run: dotnet restore secure-file-upload-dotnet.sln

      - name: Build (Release)
        run: dotnet build secure-file-upload-dotnet.sln --configuration Release --no-restore

      - name: Run solution tests
        run: dotnet test secure-file-upload-dotnet.sln --configuration Release --no-build

      - name: Run smoke harness (net8.0)
        run: dotnet run --project tests/SmokeTest/SmokeTest.csproj --configuration Release --no-build --framework net8.0

      - name: Run smoke harness (net9.0)
        run: dotnet run --project tests/SmokeTest/SmokeTest.csproj --configuration Release --no-build --framework net9.0

      - name: Run smoke harness (net10.0)
        run: dotnet run --project tests/SmokeTest/SmokeTest.csproj --configuration Release --no-build --framework net10.0

      - name: Pack
        run: >
          dotnet pack src/SecureFileUpload.Core.csproj
          --configuration Release
          --no-build
          /p:Version=${{ steps.package-version.outputs.package_version }}
          --output nupkgs
        # On tag builds, the published package version is derived from the tag:
        #   v1.2.3 -> 1.2.3
        #   v1.2.3-preview.1 -> 1.2.3-preview.1

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nupkgs
          path: nupkgs/*.nupkg
          if-no-files-found: error

      - name: Upload symbol packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: snupkgs
          path: nupkgs/*.snupkg
          if-no-files-found: warn   # .snupkg is optional if symbols aren't embedded

  # ── Verify the fuzz harness builds against the library ────────────────
  fuzz-build:
    name: Build Fuzz Harness
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      # FuzzHarness intentionally stays single-target (net10.0). The class
      # library it project-references is multi-target; .NET 10 SDK picks
      # the matching net10.0 build automatically.
      - name: Restore
        run: dotnet restore tests/Fuzz/FuzzHarness.csproj

      - name: Build
        run: dotnet build tests/Fuzz/FuzzHarness.csproj --configuration Release --no-restore

  # ── Publish to NuGet.org — only on version tags ───────────────────────
  #
  # Authentication uses NuGet.org Trusted Publishing (OIDC): the NuGet/login
  # action exchanges this job's GitHub OIDC token for a short-lived API key.
  # No long-lived NUGET_API_KEY secret exists anywhere. The trust policy is
  # configured on nuget.org (profile → Trusted Publishing) and is scoped to
  # this repository + this workflow file + the 'nuget-publish' environment.
  publish:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: [build, fuzz-build]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      id-token: write   # required to mint the OIDC token for Trusted Publishing

    environment:
      name: nuget-publish
      # The URL shown on the environment after a successful publish.
      url: https://www.nuget.org/packages/SecureFileUpload.Core

    steps:
      - name: Download NuGet artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nupkgs
          path: nupkgs

      - name: Download symbol packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: snupkgs
          path: nupkgs
        continue-on-error: true   # symbol upload is non-fatal

      - name: NuGet.org login (Trusted Publishing / OIDC)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: systemslibrarian

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: >
          dotnet nuget push nupkgs/*.nupkg
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols to NuGet.org
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          shopt -s nullglob
          snupkgs=(nupkgs/*.snupkg)
          if [ ${#snupkgs[@]} -eq 0 ]; then
            echo "No symbol packages found; skipping symbol publish."
            exit 0
          fi

          dotnet nuget push "${snupkgs[@]}" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        # The API key above is a short-lived token minted by NuGet/login via
        # Trusted Publishing — it expires shortly after the run and there is
        # no long-lived publish credential to rotate or leak.
