name: Build, Test & Publish NuGet

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # triggers publish on v1.0.0, v1.2.3-beta.1, etc.
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Build + verify the library compiles cleanly ───────────────────────
  build:
    name: Build & Pack
    runs-on: ubuntu-latest

    outputs:
      package_version: ${{ steps.package-version.outputs.package_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for Source Link

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine package version
        id: package-version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
          else
            PACKAGE_VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' src/SecureFileUpload.Core.csproj)"
          fi

          if [[ -z "$PACKAGE_VERSION" ]]; then
            echo "::error::Could not determine package version."
            exit 1
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using package version: $PACKAGE_VERSION"

      - name: Restore
        run: dotnet restore src/SecureFileUpload.Core.csproj

      - name: Build (Release)
        run: dotnet build src/SecureFileUpload.Core.csproj --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/SecureFileUpload.Core.csproj
          --configuration Release
          --no-build
          /p:Version=${{ steps.package-version.outputs.package_version }}
          --output nupkgs
        # On tag builds, the published package version is derived from the tag:
        #   v1.2.3 -> 1.2.3
        #   v1.2.3-preview.1 -> 1.2.3-preview.1

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/*.nupkg
          if-no-files-found: error

      - name: Upload symbol packages
        uses: actions/upload-artifact@v4
        with:
          name: snupkgs
          path: nupkgs/*.snupkg
          if-no-files-found: warn   # .snupkg is optional if symbols aren't embedded

  # ── Verify the fuzz harness builds against the library ────────────────
  fuzz-build:
    name: Build Fuzz Harness
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore tests/Fuzz/FuzzHarness.csproj

      - name: Build
        run: dotnet build tests/Fuzz/FuzzHarness.csproj --configuration Release --no-restore

  # ── Publish to NuGet.org — only on version tags ───────────────────────
  publish:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: [build, fuzz-build]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read

    environment:
      name: nuget-publish
      # The URL shown on the environment after a successful publish.
      url: https://www.nuget.org/packages/SecureFileUpload.Core

    steps:
      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: nupkgs

      - name: Download symbol packages
        uses: actions/download-artifact@v4
        with:
          name: snupkgs
          path: nupkgs
        continue-on-error: true   # symbol upload is non-fatal

      - name: Validate NuGet API key is configured
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::Missing NUGET_API_KEY secret. Add it in Settings > Secrets and variables > Actions (repo secret) or Environment secrets for 'nuget-publish'."
            exit 1
          fi

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push nupkgs/*.nupkg
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          shopt -s nullglob
          snupkgs=(nupkgs/*.snupkg)
          if [ ${#snupkgs[@]} -eq 0 ]; then
            echo "No symbol packages found; skipping symbol publish."
            exit 0
          fi

          dotnet nuget push "${snupkgs[@]}" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        # NUGET_API_KEY must be set in the repository's
        # Settings → Secrets → Actions → New repository secret.
        # Scope the key to this package only in your NuGet.org account.
